name: DUOS
slots:
  core:
    class: CoreUnit
handlers:
  unit:
    onStart:
      lua: |
        DUOS = {}
        DUOS.version = "0.3.0"
        DUOS.ap = false
        DUOS.mode = "OFF"
        DUOS.targetAlt = 0
        DUOS.targetHeading = 0
        DUOS.main = "#9DBDC6"
        DUOS.warn = "#C45A38"
        DUOS.good = "#3DED97"
        DUOS.blue = "#35B6EC"
        DUOS.panel = "rgba(7,20,32,.72)"

        local function safe(obj, fn, fallback)
          if obj and obj[fn] then
            local ok, value = pcall(obj[fn], obj)
            if ok and value ~= nil then return value end
          end
          return fallback
        end

        local function clamp(v, lo, hi)
          if v == nil then return lo end
          if v < lo then return lo end
          if v > hi then return hi end
          return v
        end

        local function fmt(v, d)
          return string.format("%." .. tostring(d or 0) .. "f", tonumber(v) or 0)
        end

        local function atan2(y, x)
          if math.atan2 then return math.atan2(y, x) end
          return math.atan(y, x)
        end

        function DUOS.getTelemetry(self)
          local t = {}
          t.alt = safe(unit, "getAltitude", 0) or 0
          t.name = safe(core, "getConstructName", "CONSTRUCT") or "CONSTRUCT"
          t.mass = safe(core, "getConstructMass", 0) or 0
          t.speed = 0
          t.heading = 0
          t.pitch = 0
          t.core = 0
          t.env = "SPACE"
          if t.alt < 12000 then t.env = "ATMO" end

          local v = safe(unit, "getVelocity", nil)
          if v then
            local x = v.x or v[1] or 0
            local y = v.y or v[2] or 0
            local z = v.z or v[3] or 0
            t.speed = math.sqrt(x*x + y*y + z*z)
          end

          local f = safe(unit, "getWorldOrientationForward", nil)
          if f then
            local x = f.x or f[1] or 0
            local y = f.y or f[2] or 0
            local z = f.z or f[3] or 0
            t.heading = math.deg(atan2(x, z))
            if t.heading < 0 then t.heading = t.heading + 360 end
            t.pitch = math.deg(math.asin(clamp(-y, -1, 1)))
          end

          if core and core.getCurrentStress and core.getMaxCoreStress then
            local cur = safe(core, "getCurrentStress", 0) or 0
            local max = safe(core, "getMaxCoreStress", 0) or 0
            if max > 0 then t.core = clamp(100 - ((cur / max) * 100), 0, 100) end
          end

          return t
        end

        function DUOS.bar(self, x, y, label, val, color)
          val = clamp(val or 0, 0, 100)
          local w = math.floor(220 * val / 100)
          local s = ""
          s = s .. "<text x='" .. x .. "' y='" .. y .. "' class='l'>" .. label .. " " .. fmt(val,0) .. "%</text>"
          s = s .. "<rect x='" .. x .. "' y='" .. (y+8) .. "' width='220' height='12' fill='rgba(8,18,28,.75)' stroke='" .. self.main .. "' stroke-width='1'/>"
          s = s .. "<rect x='" .. x .. "' y='" .. (y+10) .. "' width='" .. w .. "' height='8' fill='" .. color .. "' opacity='.85'/>"
          return s
        end

        function DUOS.buildHUD(self)
          local t = self.getTelemetry(self)
          local apColor = self.ap and self.good or self.warn
          local horizonY = math.floor(540 + clamp(t.pitch, -45, 45) * 3)
          local p = {}
          local function add(s) table.insert(p, s) end

          add("<svg viewBox='0 0 1920 1080' xmlns='http://www.w3.org/2000/svg'>")
          add("<defs><style>")
          add(".m{font-family:Arial;font-size:34px;font-weight:700;letter-spacing:3px;fill:" .. self.main .. "}")
          add(".l{font-family:Arial;font-size:17px;letter-spacing:2px;fill:rgba(220,245,255,.85)}")
          add(".v{font-family:Arial;font-size:38px;font-weight:700;fill:#E7F8FF}")
          add(".line{stroke:" .. self.main .. ";stroke-width:2;fill:none}")
          add("</style></defs>")
          add("<rect width='1920' height='1080' fill='#050B12' opacity='.08'/>")
          add("<polygon points='56,160 326,104 382,170 382,910 314,982 56,924' fill='" .. self.panel .. "' stroke='" .. self.main .. "' stroke-width='2'/>")
          add("<text x='90' y='230' class='m'>DUOS</text>")
          add("<text x='92' y='260' class='l'>FLIGHT OPERATING SYSTEM</text>")
          add("<text x='92' y='330' class='l'>CONSTRUCT</text>")
          add("<text x='92' y='372' class='v'>" .. t.name .. "</text>")
          add("<text x='92' y='438' class='l'>ENVIRONMENT</text>")
          add("<text x='92' y='480' class='v'>" .. t.env .. "</text>")
          add(self.bar(self,92,545,"CORE",t.core,self.warn))
          add("<polygon points='1864,160 1594,104 1538,170 1538,910 1606,982 1864,924' fill='" .. self.panel .. "' stroke='" .. self.main .. "' stroke-width='2'/>")
          add("<text x='1590' y='230' class='m'>NAV</text>")
          add("<text x='1592' y='330' class='l'>AUTOPILOT</text>")
          add("<text x='1592' y='372' class='v' fill='" .. apColor .. "'>" .. (self.ap and "ACTIVE" or "OFF") .. "</text>")
          add("<text x='1592' y='438' class='l'>MODE</text>")
          add("<text x='1592' y='480' class='v'>" .. self.mode .. "</text>")
          add("<text x='1592' y='548' class='l'>HEADING</text>")
          add("<text x='1592' y='592' class='v'>" .. fmt(t.heading,0) .. "</text>")
          add("<text x='1592' y='660' class='l'>PITCH</text>")
          add("<text x='1592' y='704' class='v'>" .. fmt(t.pitch,0) .. "</text>")
          add("<line x1='760' y1='540' x2='1160' y2='540' class='line'/>")
          add("<line x1='960' y1='340' x2='960' y2='740' class='line' opacity='.65'/>")
          add("<circle cx='960' cy='540' r='86' fill='none' stroke='" .. self.main .. "' stroke-width='2'/>")
          add("<line x1='820' y1='" .. horizonY .. "' x2='1100' y2='" .. horizonY .. "' stroke='" .. self.good .. "' stroke-width='3'/>")
          add("<polygon points='470,942 1450,942 1490,982 1450,1024 470,1024 430,982' fill='" .. self.panel .. "' stroke='" .. self.main .. "' stroke-width='2'/>")
          add("<text x='530' y='980' class='l'>ALTITUDE</text><text x='530' y='1012' class='v'>" .. fmt(t.alt,0) .. " m</text>")
          add("<text x='790' y='980' class='l'>VELOCITY</text><text x='790' y='1012' class='v'>" .. fmt(t.speed*3.6,0) .. " km/h</text>")
          add("<text x='1060' y='980' class='l'>MASS</text><text x='1060' y='1012' class='v'>" .. fmt(t.mass/1000,0) .. " t</text>")
          add("<text x='1285' y='980' class='l'>VERSION</text><text x='1285' y='1012' class='v'>" .. self.version .. "</text>")
          add("</svg>")
          return table.concat(p, "")
        end

        function DUOS.apUpdate(self)
          if not self.ap or not unit or not unit.setEngineCommand then return end
          if self.mode == "ALT" or self.mode == "ORBIT" then
            local alt = safe(unit, "getAltitude", 0) or 0
            local err = (self.targetAlt or alt) - alt
            local vc = clamp(err * 0.0005, -1, 1)
            pcall(unit.setEngineCommand, unit, "vertical", vc)
            pcall(unit.setEngineCommand, unit, "pitch", 0)
            pcall(unit.setEngineCommand, unit, "roll", 0)
            pcall(unit.setEngineCommand, unit, "yaw", 0)
          elseif self.mode == "HDG" then
            local f = safe(unit, "getWorldOrientationForward", nil)
            if f then
              local h = atan2(f.x or f[1] or 0, f.z or f[3] or 0)
              local err = (self.targetHeading or h) - h
              err = (err + math.pi) % (2 * math.pi) - math.pi
              pcall(unit.setEngineCommand, unit, "yaw", clamp(err * 0.5, -1, 1))
            end
          end
        end

        function DUOS.onStart(self)
          system.print("DUOS " .. self.version .. " loaded")
          system.print("ALT+4 AP | ALT+5 ALT | ALT+6 HDG | ALT+8 ORBIT")
          if unit and unit.setTimer then unit.setTimer("duos", 0.25) end
          self.onUpdate(self)
        end

        function DUOS.onTimer(self, timerId)
          if timerId == "duos" then self.onUpdate(self) end
        end

        function DUOS.onUpdate(self)
          self.apUpdate(self)
          if system and system.setScreen then
            pcall(system.setScreen, system, self.buildHUD(self))
          end
        end

        function DUOS.onActionStart(self, action)
          local a = string.lower(action or "")
          if a == "alt+4" then
            self.ap = not self.ap
            self.mode = self.ap and "STANDBY" or "OFF"
            system.print("DUOS autopilot " .. (self.ap and "ON" or "OFF"))
          elseif a == "alt+5" then
            self.ap = true
            self.mode = "ALT"
            self.targetAlt = safe(unit, "getAltitude", 0) or 0
          elseif a == "alt+6" then
            self.ap = true
            self.mode = "HDG"
            local f = safe(unit, "getWorldOrientationForward", nil)
            if f then self.targetHeading = atan2(f.x or f[1] or 0, f.z or f[3] or 0) end
          elseif a == "alt+8" then
            self.ap = true
            self.mode = "ORBIT"
            self.targetAlt = 20000
          end
        end

        script = DUOS
    onTimer(timerId):
      lua: script.onTimer(script,timerId)
  system:
    onActionStart(action):
      lua: script.onActionStart(script,action)
