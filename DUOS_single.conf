name: DUOS
slots:
  core:
    class: CoreUnit
  gyro:
    class: GyroUnit
  shield:
    class: ShieldGeneratorUnit
    select: manual
  databank:
    class: DataBank
    select: manual
handlers:
  library:
    onStart:
      lua: |
        -- DUOS v0.2.2 - YAML-safe single file build
        DUOS = {}
        DUOS.version = "0.2.2"
        DUOS.state = { ap = false, mode = "NONE", targetAlt = 0, targetHeading = 0 }
        DUOS.cfg = {}
        DUOS.cfg.main = "#9DBDC6"
        DUOS.cfg.warn = "#C45A38"
        DUOS.cfg.good = "#3DED97"
        DUOS.cfg.blue = "#35B6EC"
        DUOS.cfg.panel = "rgba(7,20,32,.72)"
        DUOS.cfg.keyAP = "alt+4"
        DUOS.cfg.keyAlt = "alt+5"
        DUOS.cfg.keyHdg = "alt+6"
        DUOS.cfg.keyOrbit = "alt+8"
        DUOS.cfg.orbitAlt = 20000

        local function call(obj, fn, fallback)
          if obj and obj[fn] then
            local ok, value = pcall(obj[fn], obj)
            if ok and value ~= nil then return value end
          end
          return fallback
        end

        local function clamp(v, lo, hi)
          if v == nil then return lo end
          if v < lo then return lo end
          if v > hi then return hi end
          return v
        end

        local function fmt(v, d)
          return string.format("%." .. tostring(d or 0) .. "f", tonumber(v) or 0)
        end

        function DUOS.getTelemetry()
          local t = {}
          t.alt = call(unit, "getAltitude", 0) or 0
          t.name = call(core, "getConstructName", "CONSTRUCT") or "CONSTRUCT"
          t.mass = call(core, "getConstructMass", 0) or 0
          t.speed = 0
          t.heading = 0
          t.pitch = 0
          t.core = 0
          t.shield = 0
          t.throttle = 0
          t.env = "SPACE"

          local v = call(unit, "getVelocity", nil)
          if v then
            local x = v.x or v[1] or 0
            local y = v.y or v[2] or 0
            local z = v.z or v[3] or 0
            t.speed = math.sqrt(x*x + y*y + z*z)
          end

          local f = call(unit, "getWorldOrientationForward", nil)
          if f then
            local x = f.x or f[1] or 0
            local y = f.y or f[2] or 0
            local z = f.z or f[3] or 0
            t.heading = math.deg(math.atan2(x, z))
            if t.heading < 0 then t.heading = t.heading + 360 end
            t.pitch = math.deg(math.asin(clamp(-y, -1, 1)))
          end

          if core and core.getCurrentStress and core.getMaxCoreStress then
            local cur = call(core, "getCurrentStress", 0) or 0
            local max = call(core, "getMaxCoreStress", 0) or 0
            if max > 0 then t.core = clamp(100 - ((cur / max) * 100), 0, 100) end
          end

          if shield and shield.getShieldHitpoints and shield.getMaxShieldHitpoints then
            local cur = call(shield, "getShieldHitpoints", 0) or 0
            local max = call(shield, "getMaxShieldHitpoints", 0) or 0
            if max > 0 then t.shield = clamp((cur / max) * 100, 0, 100) end
          end

          if unit and unit.getThrottle then
            t.throttle = clamp((call(unit, "getThrottle", 0) or 0) * 100, 0, 100)
          end

          if t.alt < 12000 then t.env = "ATMO" end
          return t
        end

        function DUOS.bar(x, y, w, h, pct, color, label)
          pct = clamp(pct or 0, 0, 100)
          local fill = math.floor((w - 4) * pct / 100)
          local s = ""
          s = s .. "<g>"
          s = s .. "<rect x='" .. x .. "' y='" .. y .. "' width='" .. w .. "' height='" .. h .. "' fill='rgba(3,12,20,.75)' stroke='rgba(157,189,198,.42)' stroke-width='1'/>"
          s = s .. "<rect x='" .. (x+2) .. "' y='" .. (y+2) .. "' width='" .. fill .. "' height='" .. (h-4) .. "' fill='" .. color .. "' opacity='.82'/>"
          s = s .. "<text x='" .. (x+8) .. "' y='" .. (y+h-8) .. "' class='tiny'>" .. label .. " " .. fmt(pct,0) .. "%</text>"
          s = s .. "</g>"
          return s
        end

        function DUOS.hud()
          local t = DUOS.getTelemetry()
          local c = DUOS.cfg
          local apText = DUOS.state.ap and "ACTIVE" or "OFF"
          local apColor = DUOS.state.ap and c.good or c.warn
          local horizonY = math.floor(540 + clamp(t.pitch, -45, 45) * 3)
          local p = {}
          local function add(s) table.insert(p, s) end

          add("<svg viewBox='0 0 1920 1080' xmlns='http://www.w3.org/2000/svg'>")
          add("<defs>")
          add("<filter id='g'><feGaussianBlur stdDeviation='2.5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>")
          add("<style>")
          add(".major{font-family:Arial,sans-serif;font-size:34px;font-weight:700;letter-spacing:3px;fill:"..c.main..";filter:url(#g)}")
          add(".label{font-family:Arial,sans-serif;font-size:17px;letter-spacing:2px;fill:rgba(210,238,248,.84)}")
          add(".value{font-family:Arial,sans-serif;font-size:39px;font-weight:700;letter-spacing:2px;fill:#E7F8FF}")
          add(".tiny{font-family:Arial,sans-serif;font-size:14px;letter-spacing:1.5px;fill:rgba(225,245,255,.82)}")
          add(".line{stroke:"..c.main..";stroke-width:2;fill:none;filter:url(#g)}")
          add(".orange{stroke:"..c.warn..";stroke-width:2;fill:none;filter:url(#g)}")
          add("</style></defs>")

          add("<rect width='1920' height='1080' fill='#050B12' opacity='.08'/>")
          add("<g opacity='.12'>")
          add("<path d='M0 180 H1920 M0 360 H1920 M0 540 H1920 M0 720 H1920 M0 900 H1920' stroke='"..c.main.."' stroke-width='1'/>")
          add("<path d='M240 0 V1080 M480 0 V1080 M720 0 V1080 M960 0 V1080 M1200 0 V1080 M1440 0 V1080 M1680 0 V1080' stroke='"..c.main.."' stroke-width='1'/>")
          add("</g>")

          add("<polygon points='56,160 326,104 382,170 382,910 314,982 56,924' fill='"..c.panel.."' stroke='"..c.main.."' stroke-width='2' filter='url(#g)'/>")
          add("<polyline points='82,196 340,146 358,170' class='orange'/>")
          add("<text x='90' y='230' class='major'>DUOS</text>")
          add("<text x='92' y='260' class='label'>FLIGHT OPERATING SYSTEM</text>")
          add("<text x='92' y='330' class='label'>CONSTRUCT</text>")
          add("<text x='92' y='372' class='value'>"..t.name.."</text>")
          add("<text x='92' y='438' class='label'>ENVIRONMENT</text>")
          add("<text x='92' y='480' class='value'>"..t.env.."</text>")
          add(DUOS.bar(92,545,240,34,t.shield,c.blue,"SHIELD"))
          add(DUOS.bar(92,602,240,34,t.core,c.warn,"CORE"))
          add(DUOS.bar(92,659,240,34,t.throttle,c.good,"THR"))
          add("<polyline points='382,280 500,250 620,250' class='line'/>")

          add("<polygon points='1864,160 1594,104 1538,170 1538,910 1606,982 1864,924' fill='"..c.panel.."' stroke='"..c.main.."' stroke-width='2' filter='url(#g)'/>")
          add("<polyline points='1838,196 1580,146 1562,170' class='orange'/>")
          add("<text x='1590' y='230' class='major'>NAV</text>")
          add("<text x='1592' y='260' class='label'>AUTOPILOT / VECTOR</text>")
          add("<text x='1592' y='330' class='label'>AUTOPILOT</text>")
          add("<text x='1592' y='372' class='value' fill='"..apColor.."'>"..apText.."</text>")
          add("<text x='1592' y='438' class='label'>MODE</text>")
          add("<text x='1592' y='480' class='value'>"..DUOS.state.mode.."</text>")
          add("<text x='1592' y='548' class='label'>HEADING</text>")
          add("<text x='1592' y='592' class='value'>"..fmt(t.heading,0).."</text>")
          add("<text x='1592' y='660' class='label'>PITCH</text>")
          add("<text x='1592' y='704' class='value'>"..fmt(t.pitch,0).."</text>")

          add("<g filter='url(#g)'>")
          add("<line x1='760' y1='540' x2='1160' y2='540' stroke='"..c.main.."' stroke-width='2'/>")
          add("<line x1='960' y1='340' x2='960' y2='740' stroke='"..c.main.."' stroke-width='2' opacity='.65'/>")
          add("<circle cx='960' cy='540' r='86' fill='none' stroke='"..c.main.."' stroke-width='2' opacity='.75'/>")
          add("<line x1='920' y1='540' x2='945' y2='540' stroke='"..c.warn.."' stroke-width='4'/>")
          add("<line x1='975' y1='540' x2='1000' y2='540' stroke='"..c.warn.."' stroke-width='4'/>")
          add("<line x1='960' y1='500' x2='960' y2='525' stroke='"..c.warn.."' stroke-width='4'/>")
          add("<line x1='960' y1='555' x2='960' y2='580' stroke='"..c.warn.."' stroke-width='4'/>")
          add("<line x1='820' y1='"..horizonY.."' x2='1100' y2='"..horizonY.."' stroke='"..c.good.."' stroke-width='3' opacity='.82'/>")
          add("</g>")

          add("<polygon points='520,82 1400,82 1440,122 1400,162 520,162 480,122' fill='"..c.panel.."' stroke='"..c.main.."' stroke-width='2' opacity='.95'/>")
          add("<text x='590' y='116' class='label'>HEADING</text>")
          add("<text x='900' y='142' class='value'>"..fmt(t.heading,0).."</text>")
          add("<path d='M760 150 V132 M860 150 V128 M960 150 V122 M1060 150 V128 M1160 150 V132' class='line'/>")

          add("<polygon points='470,942 1450,942 1490,982 1450,1024 470,1024 430,982' fill='"..c.panel.."' stroke='"..c.main.."' stroke-width='2' opacity='.95'/>")
          add("<text x='530' y='980' class='label'>ALTITUDE</text><text x='530' y='1012' class='value'>"..fmt(t.alt,0).." m</text>")
          add("<text x='790' y='980' class='label'>VELOCITY</text><text x='790' y='1012' class='value'>"..fmt(t.speed*3.6,0).." km/h</text>")
          add("<text x='1060' y='980' class='label'>MASS</text><text x='1060' y='1012' class='value'>"..fmt(t.mass/1000,0).." t</text>")
          add("<text x='1285' y='980' class='label'>VERSION</text><text x='1285' y='1012' class='value'>"..DUOS.version.."</text>")
          add("</svg>")
          return table.concat(p, "")
        end

        function DUOS.apUpdate()
          if not DUOS.state.ap or not unit or not unit.setEngineCommand then return end
          if DUOS.state.mode == "ALT" or DUOS.state.mode == "ORBIT" then
            local alt = call(unit, "getAltitude", 0) or 0
            local err = (DUOS.state.targetAlt or alt) - alt
            local vc = clamp(err * 0.0005, -1, 1)
            pcall(unit.setEngineCommand, unit, "vertical", vc)
            pcall(unit.setEngineCommand, unit, "pitch", 0)
            pcall(unit.setEngineCommand, unit, "roll", 0)
            pcall(unit.setEngineCommand, unit, "yaw", 0)
          elseif DUOS.state.mode == "HDG" then
            local f = call(unit, "getWorldOrientationForward", nil)
            if f then
              local h = math.atan2(f.x or f[1] or 0, f.z or f[3] or 0)
              local err = (DUOS.state.targetHeading or h) - h
              err = (err + math.pi) % (2 * math.pi) - math.pi
              pcall(unit.setEngineCommand, unit, "yaw", clamp(err * 0.5, -1, 1))
            end
          end
        end

        function DUOS.update()
          DUOS.apUpdate()
          if system and system.setScreen then pcall(system.setScreen, system, DUOS.hud()) end
        end

        function DUOS.action(action)
          local a = string.lower(action or "")
          if a == DUOS.cfg.keyAP then
            DUOS.state.ap = not DUOS.state.ap
            DUOS.state.mode = DUOS.state.ap and "STANDBY" or "NONE"
            system.print("DUOS autopilot " .. (DUOS.state.ap and "ON" or "OFF"))
          elseif a == DUOS.cfg.keyAlt then
            DUOS.state.ap = true
            DUOS.state.mode = "ALT"
            DUOS.state.targetAlt = call(unit, "getAltitude", 0) or 0
          elseif a == DUOS.cfg.keyHdg then
            DUOS.state.ap = true
            DUOS.state.mode = "HDG"
            local f = call(unit, "getWorldOrientationForward", nil)
            if f then DUOS.state.targetHeading = math.atan2(f.x or f[1] or 0, f.z or f[3] or 0) end
          elseif a == DUOS.cfg.keyOrbit then
            DUOS.state.ap = true
            DUOS.state.mode = "ORBIT"
            DUOS.state.targetAlt = DUOS.cfg.orbitAlt
          end
        end

        function system.onStart()
          system.print("DUOS " .. DUOS.version .. " loaded")
          system.print("ALT+4 AP | ALT+5 ALT | ALT+6 HDG | ALT+8 ORBIT")
        end

        function system.onUpdate(dt)
          DUOS.update()
        end

        function system.onActionStart(action)
          DUOS.action(action)
        end
