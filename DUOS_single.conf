name: DUOS

# Single-file Dual Universe Operating System (DUOS)
#
# This autoconf defines a complete flight operating system for Dual Universe
# that runs entirely within a single Lua script.  All modules (autopilot,
# HUD, navigation, etc.) are implemented as tables within a global DUOS
# object.  There are no external file dependencies, no require(), and
# no file I/O.  Settings can be persisted in a Data Bank element via
# the `databank` slot.  If the databank slot is absent, defaults are
# used.

slots:
  core:
    class: CoreUnit
  gyro:
    class: GyroUnit
  shield:
    class: ShieldGeneratorUnit
  # Optional DataBank element for persisting settings.  If omitted,
  # defaults will be used and settings will not persist between
  # sessions.
  databank:
    class: DataBank
    select: manual

handlers:
  library:
    onStart:
      lua: |
        --[[
          DUOS: Dual Universe Operating System

          This script implements a basic, extensible flight operating system
          for Dual Universe within a single Lua environment.  It defines
          autopilot functions (toggle, altitude hold, heading hold, orbit),
          a minimal HUD display, and navigation waypoint logic.  All code
          resides in this one file to satisfy the Dual Universe sandbox,
          which does not allow require() or external file access.  If a
          Data Bank element is linked, the configuration is persisted across
          sessions; otherwise defaults are used.
        --]]

        -- Create the global DUOS table
        DUOS = {}

        ----------------------------------------------------------------------
        -- Configuration
        ----------------------------------------------------------------------
        -- Default settings.  These can be overridden via the databank.  The
        -- autopilot keys correspond to DU action names (e.g. "alt+4").  To
        -- change a key, edit the corresponding string below and ensure you
        -- bind the same key in your seat actions menu.
        DUOS.defaultConfig = {
          modules = {
            autopilot = true,
            hud = true,
            navigation = true,
            combat = false,
          },
          autopilot = {
            key_toggle = "alt+4",
            altitude_hold_key = "alt+5",
            heading_hold_key = "alt+6",
            orbit_key = "alt+8",
            max_speed = 1000,
            orbit_altitude = 20000,
          },
          hud = {
            color = "#00FF00",
            show_altitude = true,
            show_speed = true,
            show_navball = true,
            show_fuel = false,
          },
          navigation = {
            waypoints = {},
          },
        }

        -- Attempt to load configuration from a Data Bank.  We store all
        -- settings in a single JSON string under key "duos_config".  If the
        -- databank is unavailable or the config is missing, use defaults.
        function DUOS.loadConfig()
          local cfg = DUOS.defaultConfig
          if databank and databank.getStringValue then
            local saved = databank.getStringValue("duos_config")
            if type(saved) == "string" and saved:len() > 0 then
              -- Basic JSON parser.  Since we cannot require external libs,
              -- this parser handles numbers, booleans and strings only.  It
              -- assumes the saved string is a valid Lua chunk returning a
              -- table (e.g. using serpent or a custom serializer).
              local func, err = load("return " .. saved)
              if func then
                local ok, tbl = pcall(func)
                if ok and type(tbl) == "table" then
                  cfg = tbl
                else
                  system.print("DUOS: failed to parse config, using defaults")
                end
              else
                system.print("DUOS: invalid saved config, using defaults")
              end
            end
          end
          return cfg
        end

        -- Save configuration back to the databank.  We serialise the table
        -- using Lua syntax via basic tostring() calls.  Only numbers,
        -- booleans and strings are supported.  Tables are nested.
        local function serializeTable(tbl, indent)
          indent = indent or 0
          local chunks = {"{"}
          local prefix = string.rep(" ", indent + 2)
          for k, v in pairs(tbl) do
            local key
            if type(k) == "string" and k:match("^[%a_][%w_]*$") then
              key = k .. " = "
            else
              key = "[" .. tostring(k) .. "] = "
            end
            if type(v) == "table" then
              table.insert(chunks, prefix .. key .. serializeTable(v, indent + 2) .. ",")
            elseif type(v) == "number" or type(v) == "boolean" then
              table.insert(chunks, prefix .. key .. tostring(v) .. ",")
            elseif type(v) == "string" then
              -- Escape backslashes and quotes
              local s = v:gsub("\\", "\\\\"):gsub("\"", "\\\"")
              table.insert(chunks, prefix .. key .. '"' .. s .. '",')
            end
          end
          table.insert(chunks, string.rep(" ", indent) .. "}")
          return table.concat(chunks, "\n")
        end

        function DUOS.saveConfig()
          if not databank or not databank.setStringValue then return end
          local configStr = serializeTable(DUOS.config)
          databank.setStringValue("duos_config", configStr)
        end

        ----------------------------------------------------------------------
        -- Autopilot Module
        ----------------------------------------------------------------------
        DUOS.autopilot = {
          active = false,
          mode = "none",  -- "none", "altitude", "heading", "orbit"
          targetAltitude = nil,
          targetHeading = nil,
        }

        -- Register autopilot keybind hints to the player.  Displayed at
        -- system start.
        function DUOS.autopilot.registerKeybinds(cfg)
          system.print("DUOS Autopilot keybinds:")
          system.print("  " .. cfg.key_toggle .. " : Toggle autopilot")
          system.print("  " .. cfg.altitude_hold_key .. " : Hold current altitude")
          system.print("  " .. cfg.heading_hold_key .. " : Hold current heading")
          system.print("  " .. cfg.orbit_key .. " : Maintain orbital altitude")
        end

        -- Toggle autopilot on/off.  When turning off, reset mode and stop
        -- thrusters.
        function DUOS.autopilot.toggle()
          DUOS.autopilot.active = not DUOS.autopilot.active
          if DUOS.autopilot.active then
            DUOS.autopilot.mode = "none"
            system.print("DUOS: autopilot engaged")
          else
            -- Reset mode and targets
            DUOS.autopilot.mode = "none"
            DUOS.autopilot.targetAltitude = nil
            DUOS.autopilot.targetHeading = nil
            -- Attempt to zero engine commands safely
            if unit then
              if unit.setEngineCommand then
                pcall(unit.setEngineCommand, unit, 'pitch', 0)
                pcall(unit.setEngineCommand, unit, 'roll', 0)
                pcall(unit.setEngineCommand, unit, 'yaw', 0)
                pcall(unit.setEngineCommand, unit, 'vertical', 0)
              end
              if unit.setThrottle then
                pcall(unit.setThrottle, unit, 0)
              end
            end
            system.print("DUOS: autopilot disengaged")
          end
        end

        -- Set altitude hold at current altitude.  Requires autopilot to be
        -- active.
        function DUOS.autopilot.holdAltitude()
          if not DUOS.autopilot.active then
            system.print("DUOS: activate autopilot first")
            return
          end
          if unit and unit.getAltitude then
            DUOS.autopilot.targetAltitude = unit.getAltitude() or 0
          else
            DUOS.autopilot.targetAltitude = 0
          end
          DUOS.autopilot.mode = "altitude"
          system.print("DUOS: altitude hold engaged at " .. tostring(DUOS.autopilot.targetAltitude))
        end

        -- Set heading hold at current heading.  Requires autopilot to be
        -- active.
        function DUOS.autopilot.holdHeading()
          if not DUOS.autopilot.active then
            system.print("DUOS: activate autopilot first")
            return
          end
          if unit and unit.getWorldOrientationForward then
            local fwd = unit.getWorldOrientationForward()
            if fwd then
              DUOS.autopilot.targetHeading = math.atan2(fwd.x or 0, fwd.z or 0)
            else
              DUOS.autopilot.targetHeading = 0
            end
          else
            DUOS.autopilot.targetHeading = 0
          end
          DUOS.autopilot.mode = "heading"
          system.print("DUOS: heading hold engaged")
        end

        -- Engage orbit hold at configured altitude.  Requires autopilot to be active.
        function DUOS.autopilot.maintainOrbit(cfg)
          if not DUOS.autopilot.active then
            system.print("DUOS: activate autopilot first")
            return
          end
          DUOS.autopilot.targetAltitude = cfg.orbit_altitude or 20000
          DUOS.autopilot.mode = "orbit"
          system.print("DUOS: orbit mode at " .. tostring(DUOS.autopilot.targetAltitude))
        end

        -- Update autopilot each tick.  Implements simple P controllers for
        -- altitude and heading.  If autopilot is inactive or unit API is
        -- unavailable, returns immediately.
        function DUOS.autopilot.update(cfg, dt)
          if not DUOS.autopilot.active then return end
          if not unit then return end
          -- Only operate when setEngineCommand is available
          if not unit.setEngineCommand then return end
          local mode = DUOS.autopilot.mode
          if mode == "altitude" or mode == "orbit" then
            -- Maintain target altitude via vertical thrust
            local alt = 0
            if unit.getAltitude then
              alt = unit.getAltitude() or 0
            end
            local err = (DUOS.autopilot.targetAltitude or alt) - alt
            -- P controller: small gain; deadband of 1 m
            local gain = 0.0005
            local deadband = 1.0
            local control = 0
            if math.abs(err) > deadband then
              control = err * gain
              if control > 1 then control = 1 elseif control < -1 then control = -1 end
            end
            pcall(unit.setEngineCommand, unit, 'vertical', control)
            -- Level pitch and roll
            pcall(unit.setEngineCommand, unit, 'pitch', 0)
            pcall(unit.setEngineCommand, unit, 'roll', 0)
            -- Forward throttle
            if unit.setThrottle then pcall(unit.setThrottle, unit, 1) end
          elseif mode == "heading" then
            -- Maintain target heading via yaw
            if unit.getWorldOrientationForward then
              local fwd = unit.getWorldOrientationForward()
              if fwd then
                local currentHeading = math.atan2(fwd.x or 0, fwd.z or 0)
                local err = (DUOS.autopilot.targetHeading or currentHeading) - currentHeading
                -- Wrap to [-pi,pi]
                err = (err + math.pi) % (2*math.pi) - math.pi
                local control = err * 0.5
                if control > 1 then control = 1 elseif control < -1 then control = -1 end
                pcall(unit.setEngineCommand, unit, 'yaw', control)
                if unit.setThrottle then pcall(unit.setThrottle, unit, 1) end
              end
            end
          end
        end

        ----------------------------------------------------------------------
        -- HUD Module
        ----------------------------------------------------------------------
        DUOS.hud = {}

        -- Small utility helpers used by the HUD renderer.
        function DUOS.hud.clamp(v, min, max)
          if v == nil then return min end
          if v < min then return min end
          if v > max then return max end
          return v
        end

        function DUOS.hud.getTelemetry()
          local t = {
            alt = 0,
            speed = 0,
            heading = 0,
            pitch = 0,
            mass = 0,
            constructName = "CONSTRUCT",
            apStatus = "OFF",
            mode = "STANDBY",
            fuel = 0,
            shield = 0,
            ccs = 0,
            throttle = 0,
            atmosphere = "UNK",
          }

          if DUOS.autopilot and DUOS.autopilot.active then
            t.apStatus = "ACTIVE"
            t.mode = string.upper(DUOS.autopilot.mode or "NONE")
          end

          if unit and unit.getAltitude then
            local ok, alt = pcall(unit.getAltitude, unit)
            if ok and type(alt) == "number" then t.alt = alt end
          end

          if unit and unit.getVelocity then
            local ok, v = pcall(unit.getVelocity, unit)
            if ok and v then
              local x = v.x or v[1] or 0
              local y = v.y or v[2] or 0
              local z = v.z or v[3] or 0
              t.speed = math.sqrt(x*x + y*y + z*z)
            end
          end

          if unit and unit.getWorldOrientationForward then
            local ok, fwd = pcall(unit.getWorldOrientationForward, unit)
            if ok and fwd then
              local x = fwd.x or fwd[1] or 0
              local y = fwd.y or fwd[2] or 0
              local z = fwd.z or fwd[3] or 0
              t.heading = math.deg(math.atan2(x, z))
              if t.heading < 0 then t.heading = t.heading + 360 end
              t.pitch = math.deg(math.asin(DUOS.hud.clamp(-y, -1, 1)))
            end
          end

          if core and core.getConstructMass then
            local ok, mass = pcall(core.getConstructMass, core)
            if ok and type(mass) == "number" then t.mass = mass end
          end

          if core and core.getConstructName then
            local ok, name = pcall(core.getConstructName, core)
            if ok and type(name) == "string" and name ~= "" then t.constructName = name end
          end

          if core and core.getCurrentStress and core.getMaxCoreStress then
            local ok1, cur = pcall(core.getCurrentStress, core)
            local ok2, max = pcall(core.getMaxCoreStress, core)
            if ok1 and ok2 and type(cur) == "number" and type(max) == "number" and max > 0 then
              t.ccs = DUOS.hud.clamp(100 - ((cur / max) * 100), 0, 100)
            end
          end

          if shield and shield.getShieldHitpoints and shield.getMaxShieldHitpoints then
            local ok1, cur = pcall(shield.getShieldHitpoints, shield)
            local ok2, max = pcall(shield.getMaxShieldHitpoints, shield)
            if ok1 and ok2 and type(cur) == "number" and type(max) == "number" and max > 0 then
              t.shield = DUOS.hud.clamp((cur / max) * 100, 0, 100)
            end
          end

          -- Fuel is hard to generalize across constructs without iterating tanks.
          -- Use cfg.show_fuel only when we later attach tank slots.
          t.fuel = 0

          if unit and unit.getThrottle then
            local ok, thr = pcall(unit.getThrottle, unit)
            if ok and type(thr) == "number" then t.throttle = DUOS.hud.clamp(thr * 100, 0, 100) end
          end

          if t.alt < 12000 then
            t.atmosphere = "ATMO"
          else
            t.atmosphere = "SPACE"
          end

          return t
        end

        function DUOS.hud.bar(x, y, w, h, value, color, label)
          local pct = DUOS.hud.clamp(value or 0, 0, 100)
          local fill = math.floor((w - 4) * pct / 100)
          return string.format([[<g>
            <rect x="%d" y="%d" width="%d" height="%d" rx="0" fill="rgba(7,16,26,.70)" stroke="rgba(130,190,215,.45)" stroke-width="1"/>
            <rect x="%d" y="%d" width="%d" height="%d" rx="0" fill="%s" opacity="0.82"/>
            <text x="%d" y="%d" class="tiny">%s %.0f%%</text>
          </g>]], x, y, w, h, x+2, y+2, fill, h-4, color, x+8, y+h-8, label, pct)
        end

        -- Compose a real HUD interface as inline SVG/HTML.  This replaces the
        -- older text-only HUD and avoids external image files completely.
        function DUOS.hud.compose(cfg)
          local t = DUOS.hud.getTelemetry()
          local main = cfg.color or "#9DBDC6"
          local warn = cfg.warning_color or "#C45A38"
          local good = cfg.highlight_color or "#3DED97"
          local blue = cfg.blue or "#35B6EC"
          local bg = cfg.bg or "#050B12"
          local panel = cfg.panel or "rgba(10,28,42,.62)"

          local speedKmh = t.speed * 3.6
          local apColor = (t.apStatus == "ACTIVE") and good or warn
          local pitchY = 540 + DUOS.hud.clamp(t.pitch, -45, 45) * 3
          local headingOffset = math.floor((t.heading % 360) / 10) * 10

          local svg = string.format([[
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%%" y="-50%%" width="200%%" height="200%%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="panelGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%%" stop-color="rgba(24,54,75,.68)"/>
      <stop offset="100%%" stop-color="rgba(4,11,18,.35)"/>
    </linearGradient>
    <style>
      .major{font-family:Rajdhani,Arial,sans-serif;font-size:34px;letter-spacing:3px;fill:%s;text-shadow:0 0 8px %s;}
      .label{font-family:Rajdhani,Arial,sans-serif;font-size:18px;letter-spacing:2px;fill:rgba(180,220,235,.88);}
      .value{font-family:Rajdhani,Arial,sans-serif;font-size:40px;font-weight:700;letter-spacing:2px;fill:#E7F8FF;}
      .tiny{font-family:Rajdhani,Arial,sans-serif;font-size:14px;letter-spacing:1.5px;fill:rgba(220,245,255,.82);}
      .line{stroke:%s;stroke-width:2;fill:none;filter:url(#glow);}
      .thin{stroke:rgba(157,189,198,.42);stroke-width:1;fill:none;}
      .orange{stroke:%s;stroke-width:2;fill:none;filter:url(#glow);}
      .panel{fill:url(#panelGrad);stroke:%s;stroke-width:2;filter:url(#glow);}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="%s" opacity=".20"/>
  <g opacity=".16">
    <path d="M0 180 H1920 M0 360 H1920 M0 540 H1920 M0 720 H1920 M0 900 H1920" class="thin"/>
    <path d="M240 0 V1080 M480 0 V1080 M720 0 V1080 M960 0 V1080 M1200 0 V1080 M1440 0 V1080 M1680 0 V1080" class="thin"/>
  </g>

  <!-- left systems panel -->
  <polygon points="56,160 326,104 382,170 382,910 314,982 56,924" class="panel"/>
  <polyline points="82,196 340,146 358,170" class="orange"/>
  <text x="90" y="230" class="major">DUOS</text>
  <text x="92" y="260" class="label">FLIGHT OPERATING SYSTEM</text>
  <text x="92" y="330" class="label">CONSTRUCT</text>
  <text x="92" y="372" class="value">%s</text>
  <text x="92" y="438" class="label">ENVIRONMENT</text>
  <text x="92" y="480" class="value">%s</text>
  %s
  %s
  %s
  <polyline points="382,280 500,250 620,250" class="line"/>
  <polyline points="382,705 522,745 652,745" class="line" opacity=".55"/>

  <!-- right navigation/autopilot panel -->
  <polygon points="1864,160 1594,104 1538,170 1538,910 1606,982 1864,924" class="panel"/>
  <polyline points="1838,196 1580,146 1562,170" class="orange"/>
  <text x="1590" y="230" class="major">NAV</text>
  <text x="1592" y="260" class="label">AUTOPILOT / VECTOR</text>
  <text x="1592" y="330" class="label">AUTOPILOT</text>
  <text x="1592" y="372" class="value" fill="%s">%s</text>
  <text x="1592" y="438" class="label">MODE</text>
  <text x="1592" y="480" class="value">%s</text>
  <text x="1592" y="548" class="label">HEADING</text>
  <text x="1592" y="592" class="value">%03.0f°</text>
  <text x="1592" y="660" class="label">PITCH</text>
  <text x="1592" y="704" class="value">%+.0f°</text>
  <polyline points="1538,280 1418,250 1300,250" class="line"/>
  <polyline points="1538,705 1398,745 1268,745" class="line" opacity=".55"/>

  <!-- center horizon / reticle -->
  <g filter="url(#glow)">
    <line x1="760" y1="540" x2="1160" y2="540" stroke="%s" stroke-width="2"/>
    <line x1="960" y1="340" x2="960" y2="740" stroke="%s" stroke-width="2" opacity=".65"/>
    <circle cx="960" cy="540" r="86" fill="none" stroke="%s" stroke-width="2" opacity=".75"/>
    <line x1="920" y1="540" x2="945" y2="540" stroke="%s" stroke-width="4"/>
    <line x1="975" y1="540" x2="1000" y2="540" stroke="%s" stroke-width="4"/>
    <line x1="960" y1="500" x2="960" y2="525" stroke="%s" stroke-width="4"/>
    <line x1="960" y1="555" x2="960" y2="580" stroke="%s" stroke-width="4"/>
    <line x1="820" y1="%d" x2="1100" y2="%d" stroke="%s" stroke-width="3" opacity=".82"/>
  </g>

  <!-- compass tape -->
  <polygon points="520,82 1400,82 1440,122 1400,162 520,162 480,122" fill="%s" stroke="%s" stroke-width="2" opacity=".95"/>
  <text x="590" y="116" class="label">HEADING</text>
  <text x="900" y="142" class="value">%03.0f°</text>
  <text x="1140" y="116" class="label">TAPE %03d</text>
  <path d="M560 150 H1360" class="thin"/>
  <path d="M760 150 V132 M860 150 V128 M960 150 V122 M1060 150 V128 M1160 150 V132" class="line"/>

  <!-- bottom telemetry bar -->
  <polygon points="470,942 1450,942 1490,982 1450,1024 470,1024 430,982" fill="%s" stroke="%s" stroke-width="2" opacity=".95"/>
  <text x="530" y="980" class="label">ALTITUDE</text>
  <text x="530" y="1012" class="value">%.0f m</text>
  <text x="790" y="980" class="label">VELOCITY</text>
  <text x="790" y="1012" class="value">%.0f km/h</text>
  <text x="1060" y="980" class="label">MASS</text>
  <text x="1060" y="1012" class="value">%.0f t</text>
  <text x="1285" y="980" class="label">FPS</text>
  <text x="1285" y="1012" class="value">LIVE</text>
</svg>]],
          main, main, main, warn, main, bg,
          t.constructName, t.atmosphere,
          DUOS.hud.bar(92, 545, 240, 34, t.shield, blue, "SHIELD"),
          DUOS.hud.bar(92, 602, 240, 34, t.ccs, warn, "CORE"),
          DUOS.hud.bar(92, 659, 240, 34, t.throttle, good, "THR"),
          apColor, t.apStatus, t.mode, t.heading, t.pitch,
          main, main, main, warn, warn, warn, warn, pitchY, pitchY, good,
          panel, main, t.heading, headingOffset,
          panel, main, t.alt, speedKmh, t.mass / 1000)

          return svg
        end

        -- Update HUD each tick
        function DUOS.hud.update(cfg)
          if not system or not system.setScreen then return end
          local text = DUOS.hud.compose(cfg)
          pcall(system.setScreen, system, text)
        end

        ----------------------------------------------------------------------
        -- Navigation Module
        ----------------------------------------------------------------------
        DUOS.navigation = {
          waypoints = {},
        }

        -- Add a waypoint (x,y,z) to the list
        function DUOS.navigation.addWaypoint(x, y, z)
          table.insert(DUOS.navigation.waypoints, {x = x, y = y, z = z})
          system.print(string.format("Waypoint added: %.0f, %.0f, %.0f", x, y, z))
        end

        -- Check if at current waypoint (within 100m)
        local function atWaypoint()
          if #DUOS.navigation.waypoints == 0 then return false end
          if not unit or not unit.getWorldPosition then return false end
          local pos = unit.getWorldPosition()
          local wp = DUOS.navigation.waypoints[1]
          if not pos or not wp then return false end
          local dx = (wp.x or 0) - (pos.x or 0)
          local dy = (wp.y or 0) - (pos.y or 0)
          local dz = (wp.z or 0) - (pos.z or 0)
          local dist = math.sqrt(dx*dx + dy*dy + dz*dz)
          return dist < 100
        end

        -- Update navigation: if autopilot is active and idle, fly to next waypoint
        function DUOS.navigation.update(cfg)
          if not DUOS.autopilot.active then return end
          if #DUOS.navigation.waypoints == 0 then return end
          -- If at waypoint, remove it
          if atWaypoint() then
            table.remove(DUOS.navigation.waypoints, 1)
            system.print("DUOS: reached waypoint")
            return
          end
          -- Otherwise, if autopilot is not in a specific mode, set altitude/heading to steer toward waypoint (simple mode)
          if DUOS.autopilot.mode == "none" then
            -- Compute direction to waypoint
            local pos = unit.getWorldPosition()
            local wp = DUOS.navigation.waypoints[1]
            if not pos or not wp then return end
            local dx = (wp.x or 0) - (pos.x or 0)
            local dy = (wp.y or 0) - (pos.y or 0)
            local dz = (wp.z or 0) - (pos.z or 0)
            local dist = math.sqrt(dx*dx + dy*dy + dz*dz)
            if dist > 0 then
              -- Desired heading and pitch
              DUOS.autopilot.targetHeading = math.atan2(dx, dz)
              DUOS.autopilot.targetAltitude = pos.y + dy  -- Aim directly
              DUOS.autopilot.mode = "heading"
              system.print("DUOS: navigating to waypoint")
            end
          end
        end

        ----------------------------------------------------------------------
        -- Master initialisation
        ----------------------------------------------------------------------
        function DUOS.init()
          -- Load configuration from databank or defaults
          DUOS.config = DUOS.loadConfig()
          -- Display keybind hints
          DUOS.autopilot.registerKeybinds(DUOS.config.autopilot)
          system.print("DUOS initialised")
        end

        -- Periodic update.  Called from system.onUpdate(dt)
        function DUOS.update(dt)
          local cfg = DUOS.config
          if cfg.modules.autopilot then
            DUOS.autopilot.update(cfg.autopilot, dt)
          end
          if cfg.modules.navigation then
            DUOS.navigation.update(cfg.navigation)
          end
          if cfg.modules.hud then
            DUOS.hud.update(cfg.hud)
          end
        end

        -- Handle action events.  Called from system.onActionStart(action)
        function DUOS.onActionStart(action)
          local a = string.lower(action)
          local apcfg = DUOS.config.autopilot
          if a == apcfg.key_toggle then
            DUOS.autopilot.toggle()
          elseif a == apcfg.altitude_hold_key then
            DUOS.autopilot.holdAltitude()
          elseif a == apcfg.heading_hold_key then
            DUOS.autopilot.holdHeading()
          elseif a == apcfg.orbit_key then
            DUOS.autopilot.maintainOrbit(apcfg)
          end
        end

        -- Register system event handlers.  When the script is loaded, these
        -- functions will be called by DU automatically.
        function system.onStart()
          DUOS.init()
        end
        function system.onUpdate(dt)
          DUOS.update(dt)
        end
        function system.onActionStart(action)
          DUOS.onActionStart(action)
        end

        -- Persist configuration when the construct stops (optional)
        function system.onStop()
          DUOS.saveConfig()
        end
